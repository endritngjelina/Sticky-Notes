<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Sticky Notes Board</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow: hidden;
        }

        .toolbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            padding: 0 20px;
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
        }

        .toolbar h1 {
            color: #333;
            font-size: 24px;
            font-weight: 600;
            margin-right: 30px;
        }

        .toolbar-section {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-right: 30px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: #007AFF;
            color: white;
        }

        .btn-primary:hover {
            background: #0056CC;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #F2F2F7;
            color: #333;
        }

        .btn-secondary:hover {
            background: #E5E5EA;
        }

        .color-picker {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .color-option {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .color-option:hover {
            transform: scale(1.1);
        }

        .color-option.active {
            border-color: #333;
            box-shadow: 0 0 0 2px rgba(51, 51, 51, 0.3);
        }

        .search-box {
            position: relative;
            margin-left: auto;
        }

        .search-box input {
            padding: 8px 16px 8px 40px;
            border: 1px solid #ddd;
            border-radius: 20px;
            font-size: 14px;
            width: 250px;
            background: white;
        }

        .search-box::before {
            content: '🔍';
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
        }

        .board {
            position: relative;
            width: 100vw;
            height: 100vh;
            padding-top: 60px;
            overflow: hidden;
        }

        .sticky-note {
            position: absolute;
            width: 200px;
            min-height: 200px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            cursor: move;
            transition: all 0.2s ease;
            font-family: inherit;
            overflow: hidden;
        }

        .sticky-note:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
        }

        .sticky-note.dragging {
            transform: rotate(5deg) scale(1.05);
            z-index: 1000;
        }

        .note-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px 8px;
            background: rgba(0, 0, 0, 0.05);
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .note-timestamp {
            font-size: 11px;
            color: rgba(0, 0, 0, 0.6);
            font-weight: 500;
        }

        .note-controls {
            display: flex;
            gap: 8px;
        }

        .note-btn {
            width: 24px;
            height: 24px;
            border: none;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.1);
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s ease;
        }

        .note-btn:hover {
            background: rgba(0, 0, 0, 0.2);
            transform: scale(1.1);
        }

        .note-content {
            padding: 15px;
            height: calc(100% - 45px);
            min-height: 155px;
        }

        .note-textarea {
            width: 100%;
            height: 100%;
            border: none;
            outline: none;
            background: transparent;
            resize: none;
            font-family: inherit;
            font-size: 14px;
            line-height: 1.4;
            color: #333;
        }

        .note-textarea::placeholder {
            color: rgba(0, 0, 0, 0.5);
        }

        .note-footer {
            padding: 8px 15px;
            background: rgba(0, 0, 0, 0.03);
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: rgba(0, 0, 0, 0.6);
        }

        .word-count {
            font-weight: 500;
        }

        .priority-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: transparent;
        }

        .priority-high { background: #FF3B30; }
        .priority-medium { background: #FF9500; }
        .priority-low { background: #34C759; }

        /* Note Colors */
        .note-yellow { background: #FFF3CD; }
        .note-pink { background: #F8D7DA; }
        .note-blue { background: #CCE5FF; }
        .note-green { background: #D4EDDA; }
        .note-purple { background: #E2E3FF; }
        .note-orange { background: #FFE8CC; }

        .add-note-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #007AFF;
            color: white;
            border: none;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 122, 255, 0.3);
            transition: all 0.2s ease;
            z-index: 999;
        }

        .add-note-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 30px rgba(0, 122, 255, 0.4);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            z-index: 2000;
        }

        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border-radius: 16px;
            padding: 30px;
            width: 400px;
            max-width: 90vw;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal h2 {
            margin-bottom: 20px;
            color: #333;
            font-size: 20px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .stats-panel {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 15px 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            font-size: 12px;
            color: #666;
        }

        .hidden {
            display: none !important;
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .note-resizer {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 15px;
            height: 15px;
            cursor: nw-resize;
            background: linear-gradient(-45deg, transparent 0%, transparent 30%, rgba(0,0,0,0.1) 30%, rgba(0,0,0,0.1) 70%, transparent 70%);
        }

        @media (max-width: 768px) {
            .toolbar {
                flex-wrap: wrap;
                height: auto;
                padding: 10px;
            }
            
            .toolbar-section {
                margin-right: 15px;
                margin-bottom: 10px;
            }
            
            .search-box input {
                width: 200px;
            }
            
            .sticky-note {
                width: 180px;
                min-height: 180px;
            }
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <h1>📝 Notes Board</h1>
        
        <div class="toolbar-section">
            <button class="btn btn-primary" id="addNoteBtn">
                ➕ Add Note
            </button>
            <button class="btn btn-secondary" id="clearAllBtn">
                🗑️ Clear All
            </button>
        </div>

        <div class="toolbar-section">
            <span style="font-size: 14px; color: #666; margin-right: 10px;">Quick Color:</span>
            <div class="color-picker">
                <div class="color-option note-yellow active" data-color="yellow"></div>
                <div class="color-option note-pink" data-color="pink"></div>
                <div class="color-option note-blue" data-color="blue"></div>
                <div class="color-option note-green" data-color="green"></div>
                <div class="color-option note-purple" data-color="purple"></div>
                <div class="color-option note-orange" data-color="orange"></div>
            </div>
        </div>

        <div class="toolbar-section">
            <button class="btn btn-secondary" id="exportBtn">
                📤 Export
            </button>
            <button class="btn btn-secondary" id="importBtn">
                📥 Import
            </button>
            <input type="file" id="importFile" accept=".json" style="display: none;">
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search notes...">
        </div>
    </div>

    <div class="board" id="board"></div>

    <button class="add-note-btn" id="floatingAddBtn">+</button>

    <div class="stats-panel" id="statsPanel">
        <div>Total Notes: <span id="totalNotes">0</span></div>
        <div>Words: <span id="totalWords">0</span></div>
        <div>Last Updated: <span id="lastUpdated">Never</span></div>
    </div>

    <div class="modal" id="noteModal">
        <div class="modal-content">
            <h2 id="modalTitle">Create New Note</h2>
            <form id="noteForm">
                <div class="form-group">
                    <label for="noteText">Note Content:</label>
                    <textarea id="noteText" placeholder="Enter your note here..." required></textarea>
                </div>
                <div class="form-group">
                    <label for="noteColor">Color:</label>
                    <select id="noteColor">
                        <option value="yellow">Yellow</option>
                        <option value="pink">Pink</option>
                        <option value="blue">Blue</option>
                        <option value="green">Green</option>
                        <option value="purple">Purple</option>
                        <option value="orange">Orange</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="notePriority">Priority:</label>
                    <select id="notePriority">
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="saveBtn">Save Note</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        class StickyNotesBoard {
            constructor() {
                this.notes = [];
                this.currentEditingNote = null;
                this.selectedColor = 'yellow';
                this.draggedNote = null;
                this.initializeEventListeners();
                this.loadNotes();
                this.updateStats();
            }

            initializeEventListeners() {
                // Toolbar buttons
                document.getElementById('addNoteBtn').addEventListener('click', () => this.openModal());
                document.getElementById('floatingAddBtn').addEventListener('click', () => this.openModal());
                document.getElementById('clearAllBtn').addEventListener('click', () => this.clearAllNotes());
                document.getElementById('exportBtn').addEventListener('click', () => this.exportNotes());
                document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importFile').click());
                document.getElementById('importFile').addEventListener('change', (e) => this.importNotes(e));

                // Modal events
                document.getElementById('noteForm').addEventListener('submit', (e) => this.saveNote(e));
                document.getElementById('cancelBtn').addEventListener('click', () => this.closeModal());
                document.getElementById('noteModal').addEventListener('click', (e) => {
                    if (e.target.id === 'noteModal') this.closeModal();
                });

                // Color picker
                document.querySelectorAll('.color-option').forEach(option => {
                    option.addEventListener('click', (e) => this.selectColor(e.target.dataset.color));
                });

                // Search
                document.getElementById('searchInput').addEventListener('input', (e) => this.searchNotes(e.target.value));

                // Board click (for adding notes)
                document.getElementById('board').addEventListener('dblclick', (e) => {
                    if (e.target.id === 'board') {
                        this.openModal(e.clientX - 100, e.clientY - 100);
                    }
                });

                // Keyboard shortcuts
                document.addEventListener('keydown', (e) => {
                    if (e.ctrlKey || e.metaKey) {
                        switch(e.key) {
                            case 'n':
                                e.preventDefault();
                                this.openModal();
                                break;
                            case 's':
                                e.preventDefault();
                                this.saveNotes();
                                break;
                            case 'f':
                                e.preventDefault();
                                document.getElementById('searchInput').focus();
                                break;
                        }
                    }
                });
            }

            openModal(x = null, y = null) {
                this.currentEditingNote = null;
                this.modalX = x;
                this.modalY = y;
                
                document.getElementById('modalTitle').textContent = 'Create New Note';
                document.getElementById('noteText').value = '';
                document.getElementById('noteColor').value = this.selectedColor;
                document.getElementById('notePriority').value = 'medium';
                document.getElementById('saveBtn').textContent = 'Save Note';
                
                document.getElementById('noteModal').style.display = 'block';
                document.getElementById('noteText').focus();
            }

            closeModal() {
                document.getElementById('noteModal').style.display = 'none';
                this.currentEditingNote = null;
            }

            saveNote(e) {
                e.preventDefault();
                
                const text = document.getElementById('noteText').value.trim();
                const color = document.getElementById('noteColor').value;
                const priority = document.getElementById('notePriority').value;
                
                if (!text) return;

                if (this.currentEditingNote) {
                    // Update existing note
                    this.currentEditingNote.text = text;
                    this.currentEditingNote.color = color;
                    this.currentEditingNote.priority = priority;
                    this.currentEditingNote.lastModified = new Date().toISOString();
                    this.updateNoteElement(this.currentEditingNote);
                } else {
                    // Create new note
                    const note = {
                        id: Date.now(),
                        text: text,
                        color: color,
                        priority: priority,
                        x: this.modalX || Math.random() * (window.innerWidth - 300) + 100,
                        y: this.modalY || Math.random() * (window.innerHeight - 300) + 150,
                        width: 200,
                        height: 200,
                        created: new Date().toISOString(),
                        lastModified: new Date().toISOString()
                    };
                    
                    this.notes.push(note);
                    this.createNoteElement(note);
                }
                
                this.saveNotes();
                this.updateStats();
                this.closeModal();
            }

            createNoteElement(note) {
                const noteEl = document.createElement('div');
                noteEl.className = `sticky-note note-${note.color}`;
                noteEl.style.left = `${note.x}px`;
                noteEl.style.top = `${note.y}px`;
                noteEl.style.width = `${note.width}px`;
                noteEl.style.height = `${note.height}px`;
                noteEl.setAttribute('data-note-id', note.id);
                
                noteEl.innerHTML = `
                    <div class="note-header">
                        <div class="note-timestamp">${this.formatDate(note.created)}</div>
                        <div class="note-controls">
                            <button class="note-btn edit-btn" title="Edit">✏️</button>
                            <button class="note-btn delete-btn" title="Delete">🗑️</button>
                        </div>
                    </div>
                    <div class="note-content">
                        <textarea class="note-textarea" placeholder="Click to edit...">${note.text}</textarea>
                    </div>
                    <div class="note-footer">
                        <div class="word-count">${this.getWordCount(note.text)} words</div>
                        <div class="priority-indicator priority-${note.priority}"></div>
                    </div>
                    <div class="note-resizer"></div>
                `;

                // Add event listeners
                this.addNoteEventListeners(noteEl, note);
                
                document.getElementById('board').appendChild(noteEl);
                noteEl.classList.add('fade-in');
            }

            addNoteEventListeners(noteEl, note) {
                const textarea = noteEl.querySelector('.note-textarea');
                const deleteBtn = noteEl.querySelector('.delete-btn');
                const editBtn = noteEl.querySelector('.edit-btn');
                const resizer = noteEl.querySelector('.note-resizer');

                // Make draggable
                noteEl.addEventListener('mousedown', (e) => {
                    if (e.target === textarea || e.target === resizer) return;
                    this.startDrag(e, noteEl, note);
                });

                // Text editing
                textarea.addEventListener('input', (e) => {
                    note.text = e.target.value;
                    note.lastModified = new Date().toISOString();
                    this.updateWordCount(noteEl, note.text);
                    this.saveNotes();
                    this.updateStats();
                });

                // Delete note
                deleteBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    this.deleteNote(note.id);
                });

                // Edit note (modal)
                editBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    this.editNote(note);
                });

                // Resize functionality
                let isResizing = false;
                resizer.addEventListener('mousedown', (e) => {
                    e.stopPropagation();
                    isResizing = true;
                    
                    const startX = e.clientX;
                    const startY = e.clientY;
                    const startWidth = parseInt(noteEl.style.width);
                    const startHeight = parseInt(noteEl.style.height);

                    const resize = (e) => {
                        if (!isResizing) return;
                        
                        const width = Math.max(150, startWidth + (e.clientX - startX));
                        const height = Math.max(150, startHeight + (e.clientY - startY));
                        
                        noteEl.style.width = `${width}px`;
                        noteEl.style.height = `${height}px`;
                        
                        note.width = width;
                        note.height = height;
                    };

                    const stopResize = () => {
                        isResizing = false;
                        document.removeEventListener('mousemove', resize);
                        document.removeEventListener('mouseup', stopResize);
                        this.saveNotes();
                    };

                    document.addEventListener('mousemove', resize);
                    document.addEventListener('mouseup', stopResize);
                });
            }

            startDrag(e, noteEl, note) {
                this.draggedNote = { element: noteEl, note: note };
                noteEl.classList.add('dragging');
                
                const rect = noteEl.getBoundingClientRect();
                const offsetX = e.clientX - rect.left;
                const offsetY = e.clientY - rect.top;

                const drag = (e) => {
                    if (!this.draggedNote) return;
                    
                    const x = e.clientX - offsetX;
                    const y = e.clientY - offsetY;
                    
                    noteEl.style.left = `${x}px`;
                    noteEl.style.top = `${y}px`;
                    
                    note.x = x;
                    note.y = y;
                };

                const stopDrag = () => {
                    if (this.draggedNote) {
                        this.draggedNote.element.classList.remove('dragging');
                        this.draggedNote = null;
                        this.saveNotes();
                    }
                    document.removeEventListener('mousemove', drag);
                    document.removeEventListener('mouseup', stopDrag);
                };

                document.addEventListener('mousemove', drag);
                document.addEventListener('mouseup', stopDrag);
            }

            editNote(note) {
                this.currentEditingNote = note;
                
                document.getElementById('modalTitle').textContent = 'Edit Note';
                document.getElementById('noteText').value = note.text;
                document.getElementById('noteColor').value = note.color;
                document.getElementById('notePriority').value = note.priority;
                document.getElementById('saveBtn').textContent = 'Update Note';
                
                document.getElementById('noteModal').style.display = 'block';
                document.getElementById('noteText').focus();
            }

            updateNoteElement(note) {
                const noteEl = document.querySelector(`[data-note-id="${note.id}"]`);
                if (noteEl) {
                    noteEl.className = `sticky-note note-${note.color}`;
                    noteEl.querySelector('.note-textarea').value = note.text;
                    noteEl.querySelector('.priority-indicator').className = `priority-indicator priority-${note.priority}`;
                    this.updateWordCount(noteEl, note.text);
                }
            }

            deleteNote(noteId) {
                if (confirm('Are you sure you want to delete this note?')) {
                    this.notes = this.notes.filter(note => note.id !== noteId);
                    const noteEl = document.querySelector(`[data-note-id="${noteId}"]`);
                    if (noteEl) {
                        noteEl.remove();
                    }
                    this.saveNotes();
                    this.updateStats();
                }
            }

            clearAllNotes() {
                if (confirm('Are you sure you want to delete all notes? This action cannot be undone.')) {
                    this.notes = [];
                    document.getElementById('board').innerHTML = '';
                    this.saveNotes();
                    this.updateStats();
                }
            }

            selectColor(color) {
                this.selectedColor = color;
                document.querySelectorAll('.color-option').forEach(option => {
                    option.classList.remove('active');
                });
                document.querySelector(`[data-color="${color}"]`).classList.add('active');
            }

            searchNotes(query) {
                const notes = document.querySelectorAll('.sticky-note');
                notes.forEach(noteEl => {
                    const text = noteEl.querySelector('.note-textarea').value.toLowerCase();
                    const isVisible = text.includes(query.toLowerCase());
                    noteEl.style.display = isVisible ? 'block' : 'none';
                });
            }

            updateWordCount(noteEl, text) {
                const wordCount = this.getWordCount(text);
                noteEl.querySelector('.word-count').textContent = `${wordCount} words`;
            }

            getWordCount(text) {
                return text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
            }

            formatDate(dateString) {
                const date = new Date(dateString);
                return date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            }

            updateStats() {
                const totalNotes = this.notes.length;
                const totalWords = this.notes.reduce((sum, note) => sum + this.getWordCount(note.text), 0);
                const lastUpdated = this.notes.length > 0 ? 
                    this.formatDate(Math.max(...this.notes.map(note => new Date(note.lastModified)))) : 
                    'Never';

                document.getElementById('totalNotes').textContent = totalNotes;
                document.getElementById('totalWords').textContent = totalWords;
                document.getElementById('lastUpdated').textContent = lastUpdated;
            }

            saveNotes() {
                // Note: localStorage is not available in Claude.ai artifacts
                // In a real environment, you would use localStorage here
                console.log('Notes saved:', this.notes);
            }

            loadNotes() {
                // Note: localStorage is not available in Claude.ai artifacts
                // In a real environment, you would load from localStorage here
                // For demo purposes, we'll start with some sample notes
                this.notes = [
                    {
                        id: 1,
                        text: "Welcome to your Virtual Sticky Notes Board! 🎉\n\nFeatures:\n• Drag and drop notes\n• Resize notes\n• Multiple colors\n• Priority levels\n• Search functionality\n• Export/Import\n• Keyboard shortcuts",
                        color: "blue",
                        priority: "high",
                        x: 100,
                        y: 100,
                        width: 200,
                        height: 250,
                        created: new Date().toISOString(),
                        lastModified: new Date().toISOString()
                    },
                    {
                        id: 2,
                        text: "Double-click on the board to create a new note quickly!",
                        color: "green",
                        priority: "medium",
                        x: 350,
                        y: 150,
                        width: 200,
                        height: 200,
                        created: new Date().toISOString(),
                        lastModified: new Date().toISOString()
                    }
                ];
                
                this.notes.forEach(note => this.createNoteElement(note));
                this.updateStats();
            }

            exportNotes() {
                const dataStr = JSON.stringify(this.notes, null, 2);
                const dataBlob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(dataBlob);
                
                const link = document.createElement('a');
                link.href = url;
                link.download = `sticky-notes-${new Date().toISOString().split('T')[0]}.json`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            }

            importNotes(event) {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const importedNotes = JSON.parse(e.target.result);
                        if (Array.isArray(importedNotes)) {
                            // Clear existing notes
                            document.getElementById('board').innerHTML = '';
                            this.notes = importedNotes;
                            
                            // Recreate all notes
                            this.notes.forEach(note => this.createNoteElement(note));
                            this.updateStats();
                            this.saveNotes();
                            
                            alert(`Successfully imported ${importedNotes.length} notes!`);
                        } else {
                            alert('Invalid file format. Please select a valid notes export file.');
                        }
                    } catch (error) {
                        alert('Error importing notes. Please check the file format.');
                    }
                };
                reader.readAsText(file);
                
                // Reset file input
                event.target.value = '';
            }
        }

        // Initialize the application
        document.addEventListener('DOMContentLoaded', () => {
            new StickyNotesBoard();
        });
    </script>
</body>
</html>
