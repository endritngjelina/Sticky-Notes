<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Sticky Notes Board</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo::before {
            content: "📋";
            font-size: 32px;
        }

        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-container {
            position: relative;
        }

        .search-input {
            padding: 10px 40px 10px 15px;
            border: 2px solid #ddd;
            border-radius: 25px;
            font-size: 14px;
            width: 250px;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .search-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #495057;
            border: 2px solid #dee2e6;
        }

        .btn-secondary:hover {
            background: #e9ecef;
            transform: translateY(-1px);
        }

        .color-palette {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .color-option {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .color-option:hover {
            transform: scale(1.1);
            border-color: #fff;
        }

        .color-option.active {
            border-color: #333;
            transform: scale(1.2);
        }

        .board-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .board-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .stat-item {
            text-align: center;
            color: white;
        }

        .stat-number {
            font-size: 24px;
            font-weight: bold;
            display: block;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .board {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            min-height: 600px;
            position: relative;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .sticky-note {
            position: absolute;
            width: 200px;
            min-height: 200px;
            padding: 20px;
            border-radius: 15px;
            cursor: move;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        .sticky-note:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.3);
            z-index: 100;
        }

        .sticky-note.dragging {
            transform: rotate(5deg) scale(1.05);
            z-index: 1000;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .note-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .note-type {
            font-size: 20px;
            font-weight: bold;
        }

        .note-actions {
            display: flex;
            gap: 5px;
        }

        .note-action {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s ease;
        }

        .note-action:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(1.1);
        }

        .note-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            background: none;
            border: none;
            outline: none;
            width: 100%;
            color: inherit;
        }

        .note-content {
            resize: none;
            border: none;
            outline: none;
            background: none;
            width: 100%;
            height: 120px;
            font-size: 14px;
            line-height: 1.4;
            color: inherit;
            font-family: inherit;
        }

        .note-footer {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 11px;
            opacity: 0.7;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .priority-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }

        .priority-high { background: #ff4757; }
        .priority-medium { background: #ffa502; }
        .priority-low { background: #2ed573; }

        /* Note Colors */
        .note-yellow { background: rgba(255, 235, 59, 0.9); color: #333; }
        .note-pink { background: rgba(233, 30, 99, 0.9); color: white; }
        .note-blue { background: rgba(33, 150, 243, 0.9); color: white; }
        .note-green { background: rgba(76, 175, 80, 0.9); color: white; }
        .note-orange { background: rgba(255, 152, 0, 0.9); color: white; }
        .note-purple { background: rgba(156, 39, 176, 0.9); color: white; }

        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: white;
            margin: 5% auto;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        .close {
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            color: #aaa;
        }

        .close:hover {
            color: #333;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-textarea {
            height: 120px;
            resize: vertical;
        }

        .form-select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            background: white;
        }

        .empty-state {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 18px;
            margin-top: 100px;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 15px;
            }
            
            .controls {
                justify-content: center;
            }
            
            .search-input {
                width: 200px;
            }
            
            .sticky-note {
                width: 180px;
                min-height: 180px;
            }
            
            .board-stats {
                flex-direction: column;
                gap: 15px;
            }
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 12px;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">Virtual Sticky Notes Board</div>
            <div class="controls">
                <div class="search-container">
                    <input type="text" class="search-input" placeholder="Search notes..." id="searchInput">
                    <span class="search-icon">🔍</span>
                </div>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="high">High Priority</button>
                    <button class="filter-btn" data-filter="medium">Medium Priority</button>
                    <button class="filter-btn" data-filter="low">Low Priority</button>
                </div>
                <div class="color-palette">
                    <div class="color-option active" data-color="yellow" style="background: #ffeb3b;"></div>
                    <div class="color-option" data-color="pink" style="background: #e91e63;"></div>
                    <div class="color-option" data-color="blue" style="background: #2196f3;"></div>
                    <div class="color-option" data-color="green" style="background: #4caf50;"></div>
                    <div class="color-option" data-color="orange" style="background: #ff9800;"></div>
                    <div class="color-option" data-color="purple" style="background: #9c27b0;"></div>
                </div>
                <button class="btn btn-primary" onclick="showNoteModal()">
                    ➕ Add Note
                </button>
                <button class="btn btn-secondary" onclick="clearBoard()">
                    🗑️ Clear All
                </button>
                <button class="btn btn-secondary" onclick="exportNotes()">
                    📤 Export
                </button>
            </div>
        </div>
    </div>

    <div class="board-container">
        <div class="board-stats">
            <div class="stat-item">
                <span class="stat-number" id="totalNotes">0</span>
                <span class="stat-label">Total Notes</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="highPriorityNotes">0</span>
                <span class="stat-label">High Priority</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="completedTasks">0</span>
                <span class="stat-label">Completed</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="activeFilters">All</span>
                <span class="stat-label">Current Filter</span>
            </div>
        </div>

        <div class="board" id="board">
            <div class="empty-state" id="emptyState">
                <div class="empty-state-icon">📝</div>
                <p>No notes yet. Create your first note to get started!</p>
            </div>
        </div>
    </div>

    <!-- Modal for adding/editing notes -->
    <div id="noteModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Add New Note</h2>
                <span class="close" onclick="closeNoteModal()">&times;</span>
            </div>
            <form id="noteForm">
                <div class="form-group">
                    <label class="form-label" for="noteTitle">Title</label>
                    <input type="text" class="form-input" id="noteTitle" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="noteContent">Content</label>
                    <textarea class="form-input form-textarea" id="noteContent" required></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label" for="notePriority">Priority</label>
                    <select class="form-select" id="notePriority">
                        <option value="low">Low Priority</option>
                        <option value="medium" selected>Medium Priority</option>
                        <option value="high">High Priority</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" for="noteColor">Color</label>
                    <select class="form-select" id="noteColor">
                        <option value="yellow" selected>Yellow</option>
                        <option value="pink">Pink</option>
                        <option value="blue">Blue</option>
                        <option value="green">Green</option>
                        <option value="orange">Orange</option>
                        <option value="purple">Purple</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">💾 Save Note</button>
            </form>
        </div>
    </div>

    <script>
        class StickyNotesBoard {
            constructor() {
                this.notes = [];
                this.currentColor = 'yellow';
                this.currentFilter = 'all';
                this.searchTerm = '';
                this.editingNote = null;
                this.draggedNote = null;
                this.dragOffset = { x: 0, y: 0 };
                
                this.init();
            }

            init() {
                this.setupEventListeners();
                this.updateStats();
                this.checkEmptyState();
            }

            setupEventListeners() {
                // Color palette
                document.querySelectorAll('.color-option').forEach(option => {
                    option.addEventListener('click', (e) => {
                        document.querySelectorAll('.color-option').forEach(opt => opt.classList.remove('active'));
                        e.target.classList.add('active');
                        this.currentColor = e.target.dataset.color;
                    });
                });

                // Search
                document.getElementById('searchInput').addEventListener('input', (e) => {
                    this.searchTerm = e.target.value.toLowerCase();
                    this.filterNotes();
                });

                // Filter buttons
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        this.currentFilter = e.target.dataset.filter;
                        this.filterNotes();
                        this.updateStats();
                    });
                });

                // Modal form
                document.getElementById('noteForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.saveNote();
                });

                // Board click for new notes
                document.getElementById('board').addEventListener('dblclick', (e) => {
                    if (e.target.id === 'board') {
                        const rect = e.target.getBoundingClientRect();
                        const x = e.clientX - rect.left;
                        const y = e.clientY - rect.top;
                        this.createQuickNote(x, y);
                    }
                });

                // Keyboard shortcuts
                document.addEventListener('keydown', (e) => {
                    if (e.ctrlKey && e.key === 'n') {
                        e.preventDefault();
                        showNoteModal();
                    }
                    if (e.key === 'Escape') {
                        closeNoteModal();
                    }
                });
            }

            createNote(data) {
                const note = {
                    id: Date.now() + Math.random(),
                    title: data.title,
                    content: data.content,
                    color: data.color,
                    priority: data.priority,
                    x: data.x || Math.random() * 800,
                    y: data.y || Math.random() * 400,
                    created: new Date().toISOString(),
                    updated: new Date().toISOString()
                };

                this.notes.push(note);
                this.renderNote(note);
                this.updateStats();
                this.checkEmptyState();
                return note;
            }

            createQuickNote(x, y) {
                const note = this.createNote({
                    title: 'Quick Note',
                    content: 'Double-click to edit...',
                    color: this.currentColor,
                    priority: 'medium',
                    x: x - 100,
                    y: y - 100
                });
                
                // Auto-focus on title for quick editing
                setTimeout(() => {
                    const noteElement = document.querySelector(`[data-id="${note.id}"] .note-title`);
                    if (noteElement) {
                        noteElement.focus();
                        noteElement.select();
                    }
                }, 100);
            }

            renderNote(note) {
                const noteElement = document.createElement('div');
                noteElement.className = `sticky-note note-${note.color} fade-in`;
                noteElement.dataset.id = note.id;
                noteElement.style.left = note.x + 'px';
                noteElement.style.top = note.y + 'px';
                
                const priorityClass = `priority-${note.priority}`;
                const typeIcon = this.getPriorityIcon(note.priority);
                
                noteElement.innerHTML = `
                    <div class="note-header">
                        <span class="note-type">${typeIcon}</span>
                        <div class="note-actions">
                            <button class="note-action" onclick="app.editNote('${note.id}')" title="Edit">✏️</button>
                            <button class="note-action" onclick="app.duplicateNote('${note.id}')" title="Duplicate">📋</button>
                            <button class="note-action" onclick="app.deleteNote('${note.id}')" title="Delete">🗑️</button>
                        </div>
                    </div>
                    <input type="text" class="note-title" value="${note.title}" 
                           onblur="app.updateNoteField('${note.id}', 'title', this.value)">
                    <textarea class="note-content" 
                              onblur="app.updateNoteField('${note.id}', 'content', this.value)">${note.content}</textarea>
                    <div class="note-footer">
                        <span class="priority-indicator ${priorityClass}" title="${note.priority} priority"></span>
                        <span class="note-date">${new Date(note.created).toLocaleDateString()}</span>
                    </div>
                `;

                this.makeDraggable(noteElement);
                document.getElementById('board').appendChild(noteElement);
            }

            makeDraggable(element) {
                let isDragging = false;
                
                element.addEventListener('mousedown', (e) => {
                    if (e.target.classList.contains('note-action') || 
                        e.target.classList.contains('note-title') || 
                        e.target.classList.contains('note-content')) {
                        return;
                    }
                    
                    isDragging = true;
                    this.draggedNote = element;
                    element.classList.add('dragging');
                    
                    const rect = element.getBoundingClientRect();
                    this.dragOffset = {
                        x: e.clientX - rect.left,
                        y: e.clientY - rect.top
                    };
                    
                    document.addEventListener('mousemove', this.handleMouseMove);
                    document.addEventListener('mouseup', this.handleMouseUp);
                });
            }

            handleMouseMove = (e) => {
                if (!this.draggedNote) return;
                
                const boardRect = document.getElementById('board').getBoundingClientRect();
                const x = e.clientX - boardRect.left - this.dragOffset.x;
                const y = e.clientY - boardRect.top - this.dragOffset.y;
                
                this.draggedNote.style.left = Math.max(0, Math.min(x, boardRect.width - 200)) + 'px';
                this.draggedNote.style.top = Math.max(0, Math.min(y, boardRect.height - 200)) + 'px';
            }

            handleMouseUp = () => {
                if (!this.draggedNote) return;
                
                this.draggedNote.classList.remove('dragging');
                
                // Update note position
                const noteId = this.draggedNote.dataset.id;
                const note = this.notes.find(n => n.id == noteId);
                if (note) {
                    note.x = parseInt(this.draggedNote.style.left);
                    note.y = parseInt(this.draggedNote.style.top);
                    note.updated = new Date().toISOString();
                }
                
                this.draggedNote = null;
                document.removeEventListener('mousemove', this.handleMouseMove);
                document.removeEventListener('mouseup', this.handleMouseUp);
            }

            updateNoteField(noteId, field, value) {
                const note = this.notes.find(n => n.id == noteId);
                if (note) {
                    note[field] = value;
                    note.updated = new Date().toISOString();
                }
            }

            editNote(noteId) {
                const note = this.notes.find(n => n.id == noteId);
                if (note) {
                    this.editingNote = note;
                    document.getElementById('modalTitle').textContent = 'Edit Note';
                    document.getElementById('noteTitle').value = note.title;
                    document.getElementById('noteContent').value = note.content;
                    document.getElementById('notePriority').value = note.priority;
                    document.getElementById('noteColor').value = note.color;
                    document.getElementById('noteModal').style.display = 'block';
                }
            }

            duplicateNote(noteId) {
                const note = this.notes.find(n => n.id == noteId);
                if (note) {
                    const duplicate = {
                        ...note,
                        id: Date.now() + Math.random(),
                        x: note.x + 20,
                        y: note.y + 20,
                        title: note.title + ' (Copy)',
                        created: new Date().toISOString(),
                        updated: new Date().toISOString()
                    };
                    this.notes.push(duplicate);
                    this.renderNote(duplicate);
                    this.updateStats();
                }
            }

            deleteNote(noteId) {
                if (confirm('Are you sure you want to delete this note?')) {
                    this.notes = this.notes.filter(n => n.id != noteId);
                    document.querySelector(`[data-id="${noteId}"]`).remove();
                    this.updateStats();
                    this.checkEmptyState();
                }
            }

            saveNote() {
                const title = document.getElementById('noteTitle').value;
                const content = document.getElementById('noteContent').value;
                const priority = document.getElementById('notePriority').value;
                const color = document.getElementById('noteColor').value;

                if (this.editingNote) {
                    // Update existing note
                    this.editingNote.title = title;
                    this.editingNote.content = content;
                    this.editingNote.priority = priority;
                    this.editingNote.color = color;
                    this.editingNote.updated = new Date().toISOString();
                    
                    // Re-render the note
                    const noteElement = document.querySelector(`[data-id="${this.editingNote.id}"]`);
                    if (noteElement) {
                        noteElement.remove();
                        this.renderNote(this.editingNote);
                    }
                } else {
                    // Create new note
                    this.createNote({ title, content, priority, color });
                }

                this.editingNote = null;
                closeNoteModal();
                this.updateStats();
            }

            filterNotes() {
                const notes = document.querySelectorAll('.sticky-note');
                
                notes.forEach(noteElement => {
                    const noteId = noteElement.dataset.id;
                    const note = this.notes.find(n => n.id == noteId);
                    
                    if (!note) return;
                    
                    let showNote = true;
                    
                    // Filter by priority
                    if (this.currentFilter !== 'all' && note.priority !== this.currentFilter) {
                        showNote = false;
                    }
                    
                    // Filter by search term
                    if (this.searchTerm && 
                        !note.title.toLowerCase().includes(this.searchTerm) &&
                        !note.content.toLowerCase().includes(this.searchTerm)) {
                        showNote = false;
                    }
                    
                    noteElement.style.display = showNote ? 'block' : 'none';
                });
                
                this.checkEmptyState();
            }

            updateStats() {
                const totalNotes = this.notes.length;
                const highPriorityNotes = this.notes.filter(n => n.priority === 'high').length;
                const completedTasks = 0; // Could be implemented with a completion feature
                
                document.getElementById('totalNotes').textContent = totalNotes;
                document.getElementById('highPriorityNotes').textContent = highPriorityNotes;
                document.getElementById('completedTasks').textContent = completedTasks;
                document.getElementById('activeFilters').textContent = 
                    this.currentFilter === 'all' ? 'All' : 
                    this.currentFilter.charAt(0).toUpperCase() + this.currentFilter.slice(1);
            }

            checkEmptyState() {
                const visibleNotes = document.querySelectorAll('.sticky-note[style*="display: block"], .sticky-note:not([style*="display: none"])');
                const emptyState = document.getElementById('emptyState');
                
                if (visibleNotes.length === 0) {
                    emptyState.style.display = 'block';
                    if (this.searchTerm) {
                        emptyState.innerHTML = `
                            <div class="empty-state-icon">🔍</div>
                            <p>No notes found matching "${this.searchTerm}"</p>
                        `;
                    } else if (this.currentFilter !== 'all') {
                        emptyState.innerHTML = `
                            <div class="empty-state-icon">📋</div>
                            <p>No ${this.currentFilter} priority notes found</p>
                        `;
                    } else {
                        emptyState.innerHTML = `
                            <div class="empty-state-icon">📝</div>
                            <p>No notes yet. Create your first note to get started!</p>
                        `;
                    }
                } else {
                    emptyState.style.display = 'none';
                }
            }

            getPriorityIcon(priority) {
                const icons = {
                    'high': '🔥',
                    'medium': '⚡',
                    'low': '📌'
                };
                return icons[priority] || '📌';
            }

            exportNotes() {
                const exportData = {
                    notes: this.notes,
                    exported: new Date().toISOString(),
                    version: '1.0'
                };
                
                const dataStr = JSON.stringify(exportData, null, 2);
                const dataBlob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(dataBlob);
                
                const link = document.createElement('a');
                link.href = url;
                link.download = `sticky-notes-${new Date().toISOString().split('T')[0]}.json`;
                link.click();
                
                URL.revokeObjectURL(url);
            }

            importNotes(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        if (data.notes && Array.isArray(data.notes)) {
                            this.notes = data.notes;
                            this.renderAllNotes();
                            this.updateStats();
                            this.checkEmptyState();
                        }
                    } catch (error) {
                        alert('Invalid file format. Please select a valid notes export file.');
                    }
                };
                reader.readAsText(file);
            }

            renderAllNotes() {
                document.querySelectorAll('.sticky-note').forEach(note => note.remove());
                this.notes.forEach(note => this.renderNote(note));
            }

            clearBoard() {
                if (confirm('Are you sure you want to delete all notes? This action cannot be undone.')) {
                    this.notes = [];
                    document.querySelectorAll('.sticky-note').forEach(note => note.remove());
                    this.updateStats();
                    this.checkEmptyState();
                }
            }

            // Auto-save functionality (simulated since we can't use localStorage)
            autoSave() {
                // In a real application, this would save to localStorage
                console.log('Auto-saving notes...', this.notes);
            }

            // Load saved notes (simulated)
            loadSavedNotes() {
                // In a real application, this would load from localStorage
                // For demo purposes, we'll create some sample notes
                const sampleNotes = [
                    {
                        id: 1,
                        title: 'Welcome to Sticky Notes!',
                        content: 'This is a sample note. You can drag, edit, and delete notes. Try creating your own!',
                        color: 'yellow',
                        priority: 'high',
                        x: 50,
                        y: 50,
                        created: new Date().toISOString(),
                        updated: new Date().toISOString()
                    },
                    {
                        id: 2,
                        title: 'Project Ideas',
                        content: '• Implement dark mode\n• Add collaboration features\n• Create mobile app',
                        color: 'blue',
                        priority: 'medium',
                        x: 300,
                        y: 100,
                        created: new Date().toISOString(),
                        updated: new Date().toISOString()
                    },
                    {
                        id: 3,
                        title: 'Meeting Notes',
                        content: 'Discussed Q3 objectives and team restructuring. Follow up with Sarah about budget allocation.',
                        color: 'green',
                        priority: 'high',
                        x: 550,
                        y: 150,
                        created: new Date().toISOString(),
                        updated: new Date().toISOString()
                    }
                ];

                this.notes = sampleNotes;
                this.renderAllNotes();
                this.updateStats();
                this.checkEmptyState();
            }
        }

        // Global functions for HTML onclick handlers
        function showNoteModal() {
            app.editingNote = null;
            document.getElementById('modalTitle').textContent = 'Add New Note';
            document.getElementById('noteForm').reset();
            document.getElementById('noteColor').value = app.currentColor;
            document.getElementById('noteModal').style.display = 'block';
        }

        function closeNoteModal() {
            document.getElementById('noteModal').style.display = 'none';
            app.editingNote = null;
        }

        function clearBoard() {
            app.clearBoard();
        }

        function exportNotes() {
            app.exportNotes();
        }

        // Initialize the application
        const app = new StickyNotesBoard();

        // Load sample notes for demonstration
        app.loadSavedNotes();

        // Auto-save every 30 seconds (simulated)
        setInterval(() => {
            app.autoSave();
        }, 30000);

        // Handle file import
        document.addEventListener('DOMContentLoaded', () => {
            // Create hidden file input for import
            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.accept = '.json';
            fileInput.style.display = 'none';
            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    app.importNotes(file);
                }
            });
            document.body.appendChild(fileInput);

            // Add import button functionality
            const importBtn = document.createElement('button');
            importBtn.className = 'btn btn-secondary';
            importBtn.innerHTML = '📥 Import';
            importBtn.onclick = () => fileInput.click();
            
            const controls = document.querySelector('.controls');
            controls.insertBefore(importBtn, controls.lastElementChild);
        });

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('noteModal');
            if (event.target === modal) {
                closeNoteModal();
            }
        }

        // Prevent text selection while dragging
        document.addEventListener('selectstart', (e) => {
            if (document.querySelector('.sticky-note.dragging')) {
                e.preventDefault();
            }
        });

        // Add keyboard shortcuts info
        document.addEventListener('DOMContentLoaded', () => {
            const shortcutsInfo = document.createElement('div');
            shortcutsInfo.style.cssText = `
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: rgba(0, 0, 0, 0.8);
                color: white;
                padding: 15px;
                border-radius: 10px;
                font-size: 12px;
                z-index: 1000;
                opacity: 0;
                transition: opacity 0.3s ease;
            `;
            shortcutsInfo.innerHTML = `
                <strong>Keyboard Shortcuts:</strong><br>
                Ctrl+N: New Note<br>
                Escape: Close Modal<br>
                Double-click board: Quick Note
            `;
            document.body.appendChild(shortcutsInfo);

            // Show shortcuts on hover over logo
            const logo = document.querySelector('.logo');
            logo.addEventListener('mouseenter', () => {
                shortcutsInfo.style.opacity = '1';
            });
            logo.addEventListener('mouseleave', () => {
                shortcutsInfo.style.opacity = '0';
            });
        });

        // Add smooth scrolling for better UX
        document.documentElement.style.scrollBehavior = 'smooth';

        // Performance optimization: Debounce search
        let searchTimeout;
        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                app.searchTerm = e.target.value.toLowerCase();
                app.filterNotes();
            }, 300);
        });

        // Add visual feedback for actions
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 12px 24px;
                border-radius: 8px;
                color: white;
                font-weight: 600;
                z-index: 2000;
                transition: all 0.3s ease;
                background: ${type === 'success' ? '#4caf50' : '#f44336'};
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-20px)';
                setTimeout(() => document.body.removeChild(toast), 300);
            }, 3000);
        }

        // Override some methods to add toast notifications
        const originalDeleteNote = app.deleteNote;
        app.deleteNote = function(noteId) {
            originalDeleteNote.call(this, noteId);
            showToast('Note deleted successfully');
        };

        const originalSaveNote = app.saveNote;
        app.saveNote = function() {
            originalSaveNote.call(this);
            showToast(this.editingNote ? 'Note updated successfully' : 'Note created successfully');
        };
    </script>
</body>
</html>
