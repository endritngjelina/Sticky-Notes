<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Sticky Notes Board</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: auto;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
        }

        .logo h1 {
            color: #333;
            font-size: 24px;
            font-weight: 600;
        }

        .toolbar {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: white;
            background: linear-gradient(45deg, #667eea, #764ba2);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: #333;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
            color: #333;
        }

        .search-container {
            position: relative;
        }

        .search-input {
            padding: 10px 40px 10px 15px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 25px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.9);
            width: 250px;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            width: 300px;
        }

        .search-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
        }

        .board-container {
            padding: 30px;
            min-height: calc(100vh - 100px);
            position: relative;
        }

        .board {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            min-height: 800px;
            position: relative;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 1400px;
            margin: 0 auto;
        }

        .sticky-note {
            position: absolute;
            width: 220px;
            min-height: 220px;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            cursor: move;
            transition: all 0.3s ease;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
        }

        .sticky-note:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.2);
            z-index: 10;
        }

        .sticky-note.dragging {
            transform: rotate(5deg) scale(1.05);
            z-index: 1000;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .note-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .note-timestamp {
            font-size: 11px;
            opacity: 0.7;
            font-weight: 500;
        }

        .note-actions {
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .sticky-note:hover .note-actions {
            opacity: 1;
        }

        .note-btn {
            width: 24px;
            height: 24px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            background: rgba(255, 255, 255, 0.8);
            color: #333;
            transition: all 0.2s ease;
        }

        .note-btn:hover {
            background: rgba(255, 255, 255, 1);
            transform: scale(1.1);
        }

        .note-content {
            background: transparent;
            border: none;
            width: 100%;
            height: 150px;
            resize: none;
            font-size: 14px;
            line-height: 1.5;
            color: #333;
            font-family: inherit;
        }

        .note-content:focus {
            outline: none;
        }

        .note-content::placeholder {
            color: rgba(0, 0, 0, 0.5);
        }

        /* Color themes */
        .note-yellow {
            background: linear-gradient(135deg, #ffeaa7 0%, #fab1a0 100%);
            color: #2d3436;
        }

        .note-blue {
            background: linear-gradient(135deg, #74b9ff 0%, #0984e3 100%);
            color: white;
        }

        .note-green {
            background: linear-gradient(135deg, #55efc4 0%, #00b894 100%);
            color: #2d3436;
        }

        .note-pink {
            background: linear-gradient(135deg, #fd79a8 0%, #e84393 100%);
            color: white;
        }

        .note-orange {
            background: linear-gradient(135deg, #fdcb6e 0%, #e17055 100%);
            color: #2d3436;
        }

        .note-purple {
            background: linear-gradient(135deg, #a29bfe 0%, #6c5ce7 100%);
            color: white;
        }

        .color-picker {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            background: white;
            border-radius: 8px;
            padding: 10px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        .color-picker.active {
            display: block;
        }

        .color-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .color-option {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s ease;
        }

        .color-option:hover {
            transform: scale(1.1);
            border-color: rgba(0, 0, 0, 0.2);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            z-index: 2000;
            animation: fadeIn 0.3s ease;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            animation: slideIn 0.3s ease;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-number {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.8;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.7);
        }

        .empty-state-icon {
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .empty-state h3 {
            font-size: 24px;
            margin-bottom: 10px;
            color: rgba(255, 255, 255, 0.8);
        }

        .empty-state p {
            font-size: 16px;
            margin-bottom: 30px;
        }

        .floating-add {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(45deg, #667eea, #764ba2);
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .floating-add:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.6);
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            z-index: 3000;
            transform: translateX(400px);
            transition: transform 0.3s ease;
        }

        .toast.show {
            transform: translateX(0);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 15px;
            }
            
            .toolbar {
                justify-content: center;
            }
            
            .search-input {
                width: 200px;
            }
            
            .search-input:focus {
                width: 250px;
            }
            
            .board {
                padding: 20px;
                min-height: 600px;
            }
            
            .sticky-note {
                width: 200px;
                min-height: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">📝</div>
                <h1>StickyBoard Pro</h1>
            </div>
            <div class="toolbar">
                <button class="btn" onclick="addNote()">
                    ➕ Add Note
                </button>
                <button class="btn btn-secondary" onclick="clearAll()">
                    🗑️ Clear All
                </button>
                <button class="btn btn-secondary" onclick="exportNotes()">
                    📥 Export
                </button>
                <button class="btn btn-secondary" onclick="importNotes()">
                    📤 Import
                </button>
                <button class="btn btn-secondary" onclick="showStats()">
                    📊 Stats
                </button>
                <div class="search-container">
                    <input type="text" class="search-input" placeholder="Search notes..." oninput="searchNotes(this.value)">
                    <span class="search-icon">🔍</span>
                </div>
            </div>
        </div>
    </div>

    <div class="board-container">
        <div class="board" id="board">
            <div class="empty-state" id="emptyState">
                <div class="empty-state-icon">📝</div>
                <h3>Welcome to StickyBoard Pro</h3>
                <p>Create your first sticky note to get started!</p>
                <button class="btn" onclick="addNote()">Create Note</button>
            </div>
        </div>
    </div>

    <button class="floating-add" onclick="addNote()" title="Add new note">+</button>

    <div class="modal" id="statsModal">
        <div class="modal-content">
            <h2>📊 Board Statistics</h2>
            <div class="stats-grid" id="statsGrid">
                <!-- Stats will be populated here -->
            </div>
            <br>
            <button class="btn" onclick="closeModal()">Close</button>
        </div>
    </div>

    <div class="color-picker" id="colorPicker">
        <div class="color-options">
            <div class="color-option" style="background: linear-gradient(135deg, #ffeaa7 0%, #fab1a0 100%);" onclick="changeNoteColor('yellow')"></div>
            <div class="color-option" style="background: linear-gradient(135deg, #74b9ff 0%, #0984e3 100%);" onclick="changeNoteColor('blue')"></div>
            <div class="color-option" style="background: linear-gradient(135deg, #55efc4 0%, #00b894 100%);" onclick="changeNoteColor('green')"></div>
            <div class="color-option" style="background: linear-gradient(135deg, #fd79a8 0%, #e84393 100%);" onclick="changeNoteColor('pink')"></div>
            <div class="color-option" style="background: linear-gradient(135deg, #fdcb6e 0%, #e17055 100%);" onclick="changeNoteColor('orange')"></div>
            <div class="color-option" style="background: linear-gradient(135deg, #a29bfe 0%, #6c5ce7 100%);" onclick="changeNoteColor('purple')"></div>
        </div>
    </div>

    <input type="file" id="importFile" accept=".json" style="display: none;" onchange="handleImport(event)">

    <script>
        // In-memory storage for notes (replacing localStorage per requirements)
        let notesData = [];
        let noteIdCounter = 1;
        let draggedNote = null;
        let dragOffset = { x: 0, y: 0 };
        let currentColorNote = null;
        let searchQuery = '';

        // Initialize the application
        function init() {
            updateEmptyState();
            setInterval(autoSave, 30000); // Auto-save every 30 seconds
        }

        // Note management functions
        function addNote() {
            const note = {
                id: noteIdCounter++,
                content: '',
                color: getRandomColor(),
                x: Math.random() * 400 + 50,
                y: Math.random() * 300 + 50,
                timestamp: new Date().toISOString(),
                lastEdited: new Date().toISOString()
            };

            notesData.push(note);
            renderNote(note);
            updateEmptyState();
            showToast('Note created successfully!');
        }

        function renderNote(note) {
            const noteElement = document.createElement('div');
            noteElement.className = `sticky-note note-${note.color}`;
            noteElement.style.left = `${note.x}px`;
            noteElement.style.top = `${note.y}px`;
            noteElement.dataset.noteId = note.id;

            const formatDate = (dateString) => {
                const date = new Date(dateString);
                return date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            };

            noteElement.innerHTML = `
                <div class="note-header">
                    <span class="note-timestamp">${formatDate(note.timestamp)}</span>
                    <div class="note-actions">
                        <button class="note-btn" onclick="showColorPicker(${note.id}, event)" title="Change color">🎨</button>
                        <button class="note-btn" onclick="duplicateNote(${note.id})" title="Duplicate">📋</button>
                        <button class="note-btn" onclick="deleteNote(${note.id})" title="Delete">🗑️</button>
                    </div>
                </div>
                <textarea class="note-content" placeholder="Type your note here..." oninput="updateNoteContent(${note.id}, this.value)" onblur="saveNote(${note.id})">${note.content}</textarea>
            `;

            // Add drag functionality
            noteElement.addEventListener('mousedown', startDrag);
            noteElement.addEventListener('touchstart', startDrag);

            document.getElementById('board').appendChild(noteElement);
            
            // Auto-focus on new empty notes
            if (!note.content) {
                const textarea = noteElement.querySelector('.note-content');
                setTimeout(() => textarea.focus(), 100);
            }
        }

        function updateNoteContent(noteId, content) {
            const note = notesData.find(n => n.id === noteId);
            if (note) {
                note.content = content;
                note.lastEdited = new Date().toISOString();
                updateTimestamp(noteId);
            }
        }

        function updateTimestamp(noteId) {
            const noteElement = document.querySelector(`[data-note-id="${noteId}"]`);
            const note = notesData.find(n => n.id === noteId);
            if (noteElement && note) {
                const timestamp = noteElement.querySelector('.note-timestamp');
                const date = new Date(note.lastEdited);
                timestamp.textContent = date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            }
        }

        function saveNote(noteId) {
            showToast('Note saved!');
        }

        function deleteNote(noteId) {
            if (confirm('Are you sure you want to delete this note?')) {
                const noteElement = document.querySelector(`[data-note-id="${noteId}"]`);
                if (noteElement) {
                    noteElement.style.transition = 'all 0.3s ease';
                    noteElement.style.transform = 'scale(0)';
                    noteElement.style.opacity = '0';
                    setTimeout(() => {
                        noteElement.remove();
                        notesData = notesData.filter(note => note.id !== noteId);
                        updateEmptyState();
                        showToast('Note deleted successfully!');
                    }, 300);
                }
            }
        }

        function duplicateNote(noteId) {
            const originalNote = notesData.find(n => n.id === noteId);
            if (originalNote) {
                const duplicatedNote = {
                    id: noteIdCounter++,
                    content: originalNote.content,
                    color: originalNote.color,
                    x: originalNote.x + 20,
                    y: originalNote.y + 20,
                    timestamp: new Date().toISOString(),
                    lastEdited: new Date().toISOString()
                };

                notesData.push(duplicatedNote);
                renderNote(duplicatedNote);
                showToast('Note duplicated successfully!');
            }
        }

        // Color management
        function getRandomColor() {
            const colors = ['yellow', 'blue', 'green', 'pink', 'orange', 'purple'];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function showColorPicker(noteId, event) {
            event.stopPropagation();
            const colorPicker = document.getElementById('colorPicker');
            const noteElement = document.querySelector(`[data-note-id="${noteId}"]`);
            
            currentColorNote = noteId;
            
            const rect = noteElement.getBoundingClientRect();
            colorPicker.style.top = `${rect.top + window.scrollY}px`;
            colorPicker.style.left = `${rect.right + window.scrollX - 120}px`;
            colorPicker.classList.add('active');
            
            // Close color picker when clicking outside
            setTimeout(() => {
                document.addEventListener('click', closeColorPicker);
            }, 100);
        }

        function changeNoteColor(color) {
            if (currentColorNote) {
                const note = notesData.find(n => n.id === currentColorNote);
                const noteElement = document.querySelector(`[data-note-id="${currentColorNote}"]`);
                
                if (note && noteElement) {
                    note.color = color;
                    noteElement.className = `sticky-note note-${color}`;
                    showToast(`Note color changed to ${color}!`);
                }
            }
            closeColorPicker();
        }

        function closeColorPicker() {
            document.getElementById('colorPicker').classList.remove('active');
            document.removeEventListener('click', closeColorPicker);
            currentColorNote = null;
        }

        // Drag and drop functionality
        function startDrag(e) {
            e.preventDefault();
            draggedNote = e.currentTarget;
            draggedNote.classList.add('dragging');
            
            const rect = draggedNote.getBoundingClientRect();
            const clientX = e.clientX || e.touches[0].clientX;
            const clientY = e.clientY || e.touches[0].clientY;
            
            dragOffset.x = clientX - rect.left;
            dragOffset.y = clientY - rect.top;
            
            document.addEventListener('mousemove', drag);
            document.addEventListener('mouseup', stopDrag);
            document.addEventListener('touchmove', drag);
            document.addEventListener('touchend', stopDrag);
        }

        function drag(e) {
            if (!draggedNote) return;
            
            e.preventDefault();
            const clientX = e.clientX || e.touches[0].clientX;
            const clientY = e.clientY || e.touches[0].clientY;
            
            const boardRect = document.getElementById('board').getBoundingClientRect();
            const newX = clientX - boardRect.left - dragOffset.x;
            const newY = clientY - boardRect.top - dragOffset.y;
            
            // Constrain to board boundaries
            const maxX = boardRect.width - draggedNote.offsetWidth;
            const maxY = boardRect.height - draggedNote.offsetHeight;
            
            draggedNote.style.left = `${Math.max(0, Math.min(maxX, newX))}px`;
            draggedNote.style.top = `${Math.max(0, Math.min(maxY, newY))}px`;
        }

        function stopDrag() {
            if (draggedNote) {
                draggedNote.classList.remove('dragging');
                
                // Update note position in data
                const noteId = parseInt(draggedNote.dataset.noteId);
                const note = notesData.find(n => n.id === noteId);
                if (note) {
                    note.x = parseInt(draggedNote.style.left);
                    note.y = parseInt(draggedNote.style.top);
                }
                
                draggedNote = null;
                showToast('Note moved!');
            }
            
            document.removeEventListener('mousemove', drag);
            document.removeEventListener('mouseup', stopDrag);
            document.removeEventListener('touchmove', drag);
            document.removeEventListener('touchend', stopDrag);
        }

        // Search functionality
        function searchNotes(query) {
            searchQuery = query.toLowerCase();
            const notes = document.querySelectorAll('.sticky-note');
            
            notes.forEach(noteElement => {
                const content = noteElement.querySelector('.note-content').value.toLowerCase();
                const isVisible = content.includes(searchQuery) || searchQuery === '';
                
                noteElement.style.display = isVisible ? 'block' : 'none';
                noteElement.style.opacity = isVisible ? '1' : '0.3';
            });
        }

        // Import/Export functionality
        function exportNotes() {
            const dataStr = JSON.stringify(notesData, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
            
            const exportFileDefaultName = `sticky-notes-${new Date().toISOString().split('T')[0]}.json`;
            
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            linkElement.click();
            
            showToast('Notes exported successfully!');
        }

        function importNotes() {
            document.getElementById('importFile').click();
        }

        function handleImport(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const importedData = JSON.parse(e.target.result);
                        
                        if (Array.isArray(importedData)) {
                            if (confirm('This will replace all existing notes. Continue?')) {
                                // Clear existing notes
                                document.querySelectorAll('.sticky-note').forEach(note => note.remove());
                                notesData = [];
                                
                                // Import new notes
                                importedData.forEach(note => {
                                    note.id = noteIdCounter++;
                                    notesData.push(note);
                                    renderNote(note);
                                });
                                
                                updateEmptyState();
                                showToast('Notes imported successfully!');
                            }
                        } else {
                            throw new Error('Invalid file format');
                        }
                    } catch (error) {
                        showToast('Error importing notes: Invalid file format');
                    }
                };
                reader.readAsText(file);
            }
        }

        // Statistics
        function showStats() {
            const totalNotes = notesData.length;
            const colorCounts = {};
            const today = new Date().toDateString();
            let todayNotes = 0;
            
            notesData.forEach(note => {
                colorCounts[note.color] = (colorCounts[note.color] || 0) + 1;
                if (new Date(note.timestamp).toDateString() === today) {
                    todayNotes++;
                }
            });
            
            const mostUsedColor = Object.keys(colorCounts).reduce((a, b) => 
                colorCounts[a] > colorCounts[b] ? a : b, 'yellow');
            
            const avgWordsPerNote = totalNotes > 0 ? 
                Math.round(notesData.reduce((sum, note) => sum + (note.content.split(' ').length || 0), 0) / totalNotes) : 0;
            
            const statsHTML = `
                <div class="stat-card">
                    <div class="stat-number">${totalNotes}</div>
                    <div class="stat-label">Total Notes</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${todayNotes}</div>
                    <div class="stat-label">Created Today</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${mostUsedColor}</div>
                    <div class="stat-label">Most Used Color</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${avgWordsPerNote}</div>
                    <div class="stat-label">Avg Words/Note</div>
                </div>
            `;
            
            document.getElementById('statsGrid').innerHTML = statsHTML;
            document.getElementById('statsModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('statsModal').classList.remove('active');
        }

        // Utility functions
        function clearAll() {
            if (confirm('Are you sure you want to delete all notes? This action cannot be undone.')) {
                document.querySelectorAll('.sticky-note').forEach(note => {
                    note.style.transition = 'all 0.3s ease';
                    note.style.transform = 'scale(0)';
                    note.style.opacity = '0';
                });
                
                setTimeout(() => {
                    document.querySelectorAll('.sticky-note').forEach(note => note.remove());
                    notesData = [];
                    updateEmptyState();
                    showToast('All notes cleared!');
                }, 300);
            }
        }

        function updateEmptyState() {
            const emptyState = document.getElementById('emptyState');
            const hasNotes = notesData.length > 0;
            emptyState.style.display = hasNotes ? 'none' : 'block';
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => toast.classList.add('show'), 100);
            
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => document.body.removeChild(toast), 300);
            }, 3000);
        }

        function autoSave() {
            if (notesData.length > 0) {
                // In a real application, this would save to a backend
                console.log('Auto-saving notes...', notesData);
                showToast('Auto-saved!');
            }
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey || e.metaKey) {
                switch(e.key) {
                    case 'n':
                        e.preventDefault();
                        addNote();
                        break;
                    case 'f':
                        e.preventDefault();
                        document.querySelector('.search-input').focus();
                        break;
                    case 's':
                        e.preventDefault();
                        showToast('Notes saved!');
                        break;
                    case 'e':
                        e.preventDefault();
                        exportNotes();
                        break;
                }
            }
            
            if (e.key === 'Escape') {
                closeColorPicker();
                closeModal();
                document.querySelector('.search-input').value = '';
                searchNotes('');
            }
        });

        // Close modals when clicking outside
        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('modal')) {
                closeModal();
            }
        });

        // Initialize the application
        document.addEventListener('DOMContentLoaded', init);

        // Add some sample notes for demonstration
        setTimeout(() => {
            if (notesData.length === 0) {
                // Add sample notes
                const sampleNotes = [
                    {
                        id: noteIdCounter++,
                        content: 'Welcome to StickyBoard Pro! 🎉\n\nThis is a professional sticky notes application with advanced features.',
                        color: 'yellow',
                        x: 50,
                        y: 50,
                        timestamp: new Date().toISOString(),
                        lastEdited: new Date().toISOString()
                    },
                    {
                        id: noteIdCounter++,
                        content: 'Key Features:\n• Drag & drop functionality\n• Multiple color themes\n• Search capabilities\n• Import/Export data\n• Statistics dashboard\n• Keyboard shortcuts',
                        color: 'blue',
                        x: 300,
                        y: 80,
                        timestamp: new Date().toISOString(),
                        lastEdited: new Date().toISOString()
                    },
                    {
                        id: noteIdCounter++,
                        content: 'Keyboard Shortcuts:\n• Ctrl+N: New note\n• Ctrl+F: Search\n• Ctrl+S: Save\n• Ctrl+E: Export\n• Esc: Close/Clear',
                        color: 'green',
                        x: 550,
                        y: 110,
                        timestamp: new Date().toISOString(),
                        lastEdited: new Date().toISOString()
                    }
                ];
                
                sampleNotes.forEach(note => {
                    notesData.push(note);
                    renderNote(note);
                });
                
                updateEmptyState();
            }
        }, 1000);
    </script>
</body>
</html>
